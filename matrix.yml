
      include:
        - name: Windows-msvc2022
          os: windows-2022
          compiler: msvc-2022
          build-cversion: 17
          build-runtime: MD
          build-config: Release
          build-arch: x86_64

        - name: Linux_gcc13
          os: ubuntu-24.04
          build-compiler: gcc
          build-cversion: 13
          build-config: Release
          build-os: Linux
          build-libcxx: libstdc++11
          build-arch: x86_64

        - name: Macos_xcode16
          os: macos-15
          build-compiler: apple-clang
          build-cversion: 16
          build-config: Release
          build-os: Macos
          build-xcode-version: 16.2
          build-libcxx: libc++
          build-arch: armv8
